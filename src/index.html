<!doctype html>
<!-- 
  🌍 Archivo index.html (Página Principal)
  
  Esta es la ÚNICA página HTML real que carga el navegador al entrar a tu web.
  Como Angular es una SPA (Single Page Application), el navegador no recarga la 
  página cuando navegas. En su lugar, Angular inyecta los componentes dinámicamente 
  dentro de <app-root>.
-->
<html lang="en" class="overflow-x-clip">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ITSup</title>
  <link rel="icon" type="image/png" href="favicon.png">
</head>

<!-- 
  TailwindCSS Classes aplicadas al body:
  - antialiased: Suaviza las fuentes para que se vean más nítidas.
  - bg-bg / text-text: Usa los colores personalizados definidos en styles.css.
  - min-h-screen: Asegura que el fondo ocupe al menos toda la pantalla.
-->
<body class="antialiased bg-bg text-text min-h-screen overflow-x-clip">
  
  <!-- 
    🎯 Aquí es donde la "magia" de Angular ocurre. 
    Angular lee este <app-root> y lo reemplaza con tu componente App (app.ts).
  -->
  <app-root></app-root>

</body>

</html>
