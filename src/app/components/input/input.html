<div class="grid grid-cols-1 floating-label">
    <!-- Etiqueta del campo (ej. Correo, Contraseña) -->
    <label [for]="id()" class="font-bold text-2xl mb-5">{{label()}}</label>

    <!-- Contenedor visual del input estilo DaisyUI -->
    <label
        class="flex items-center justify-between bg-bg-dark border border-border gap-2 px-3 py-5 h-full input input-md w-full">
        <input [id]="id()" [type]="type() === 'password' && isPasswordVisible() ? 'text' : type()"
            [placeholder]="placeholder()" [formControl]="control()"
            class="grow bg-transparent border-none outline-none h-full w-full">

        <!-- Icono de Correo (a la derecha) -->
        @if (icon() === 'email') {
        <svg xmlns="http://www.w3.org/2000/svg" width="2em" height="2em" viewBox="0 0 24 24">
            <path fill="currentColor"
                d="M22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2zm-2 0l-8 5l-8-5zm0 12H4V8l8 5l8-5z">
            </path>
        </svg>
        }

        <!-- Icono de Contraseña (a la derecha y con toggle interactivo) -->
        @else if (icon() === 'password') {
        <button type="button" (click)="togglePasswordVisibility()"
            class="shrink-0 focus:outline-none hover:text-text-muted transition-colors">
            @if (isPasswordVisible()) {
            <!-- Icono de Ojo tachado (Ocultar contraseña) -->
            <svg xmlns="http://www.w3.org/2000/svg" width="2em" height="2em" viewBox="0 0 24 24">
                <path fill="currentColor"
                    d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2m-6 9c-1.1 0-2-.9-2-2s.9-2 2-2s2 .9 2 2s-.9 2-2 2m3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1z">
                </path>
            </svg>
            } @else {
            <!-- Icono de Llave DaisyUI (Mostrar contraseña) -->
            <svg xmlns="http://www.w3.org/2000/svg" width="2em" height="2em" viewBox="0 0 24 24">
                <path fill="currentColor"
                    d="M18 8a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V10a2 2 0 0 1 2-2h9V6a3 3 0 0 0-3-3a3 3 0 0 0-3 3H7a5 5 0 0 1 5-5a5 5 0 0 1 5 5v2zm-6 9a2 2 0 0 0 2-2a2 2 0 0 0-2-2a2 2 0 0 0-2 2a2 2 0 0 0 2 2">
                </path>
            </svg>

            }
        </button>
        }
    </label>
</div>
