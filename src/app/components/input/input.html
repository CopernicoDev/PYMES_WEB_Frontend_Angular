<div class="grid grid-cols-1 floating-label">
    <!-- Etiqueta del campo (ej. Correo, Contraseña) -->
    <label [for]="id()" class="mb-5 font-bold text-2xl">{{label()}}</label>

    <!-- Contenedor visual del input estilo DaisyUI -->
    <label
        class="border border-border bg-bg-dark px-3 py-5 w-full h-full input input-md flex items-center justify-between gap-2">
        <input [id]="id()" [type]="type() === 'password' && isPasswordVisible() ? 'text' : type()"
            [placeholder]="placeholder()" [formControl]="control()"
            class="grow bg-transparent border-none outline-none h-full w-full">

        <!-- Icono de Correo (a la derecha) -->
        @if (icon() === 'email') {
        <svg class="h-[1.2em] w-[1.2em] opacity-50 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
                <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
            </g>
        </svg>
        }

        <!-- Icono de Contraseña (a la derecha y con toggle interactivo) -->
        @else if (icon() === 'password') {
        <button type="button" (click)="togglePasswordVisibility()"
            class="focus:outline-none shrink-0 hover:text-text-muted transition-colors">
            @if (isPasswordVisible()) {
            <!-- Icono de Ojo tachado (Ocultar contraseña) -->
            <svg class="h-[1.2em] w-[1.2em] opacity-50" xmlns="http://www.w3.org/2000/svg" fill="none"
                viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
            </svg>
            } @else {
            <!-- Icono de Llave DaisyUI (Mostrar contraseña) -->
            <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
                    <path
                        d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z">
                    </path>
                    <circle cx="16.5" cy="7.5" r=".5" fill="currentColor"></circle>
                </g>
            </svg>
            }
        </button>
        }
    </label>
</div>
