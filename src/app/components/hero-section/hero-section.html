<main
    class="content-center grid grid-cols-1 md:grid-cols-2 gap-6 mx-auto px-4 py-8 md:gap-x-20 md:gap-y-30 md:px-12 md:py-16 h-full max-w-7xl w-full">

    <app-info-card appAnimateOnScroll enterClass="animate-fade-in-down" [once]="true"
        class="col-span-1 grid place-items-center md:col-span-2 text-center mb-10 md:mb-25">
        <h1 class="font-bold text-4xl md:text-6xl">Tu infraestructura para PYMES</h1>
    </app-info-card>

    <app-info-card appAnimateOnScroll enterClass="animate-fade-in-left" [once]="true"
        class="col-span-1 grid place-items-center text-center px-4 md:px-0">
        <h2 class="font-semibold text-xl md:text-2xl">Soporte informático al alcance de tu mano</h2>
        <h3 class="font-medium text-lg md:text-xl mt-2">Diseño preciso para tus necesidades</h3>
        <button
            class="bg-text font-semibold rounded text-bg text-lg hover:bg-text-muted mt-8 px-6 py-5 md:mt-10 md:px-50 btn w-full md:w-auto">Empieza
            ahora</button>
    </app-info-card>

    <app-info-card appAnimateOnScroll enterClass="animate-fade-in-right" [once]="true"
        class="col-span-1 grid place-items-center bg-bg-light border border-border text-center min-h-[250px] md:min-h-[350px]">
        <p>Espacio derecho (Elemento 5)</p>
    </app-info-card>
</main>
