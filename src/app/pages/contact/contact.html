<section class="grid grid-cols-1 text-center mt-10 px-4 md:mt-20">
  <h1 class="font-extrabold text-3xl md:text-5xl">Contacto</h1>
  <h2 class="font-semibold text-lg md:text-2xl pt-2.5">Conecta con nosotros</h2>
</section>

<!-- Cambiamos las columnas a proporciones fraccionales (1.5fr y 1fr) -->
<div appAnimateOnScroll enterClass="animate-fade-in-left" [once]="true"
  class="grid grid-cols-1 lg:grid-cols-[1.5fr_1fr] gap-10 mt-6 mx-auto px-4 py-6 md:mt-10 md:px-10 md:py-12 max-w-7xl w-full">

  <!-- Columna del Formulario: Centrado en móvil, alineado a la izquierda en desktop -->
  <div class="grid grid-cols-1 place-items-center w-full lg:place-items-start">
    <div class="content-start grid gap-y-8 md:gap-y-12 h-full max-w-[600px] w-full">
      <app-input label="Nombre" id="name" placeholder="Ingrese su nombre"
        [control]="contactForm.controls.name"></app-input>

      <app-input label="Correo" id="email" placeholder="Ingrese su correo" [control]="contactForm.controls.email"
        icon="email"></app-input>

      <app-input label="Asunto" id="subject" placeholder="Ingrese el asunto"
        [control]="contactForm.controls.subject"></app-input>

      <app-input label="Mensaje" id="message" type="textarea" placeholder="Ingrese su mensaje"
        [control]="contactForm.controls.message"></app-input>

      <button
        class="bg-text font-semibold rounded text-bg text-lg hover:bg-text-muted py-3 btn duration-200 h-auto min-h-0 transition-colors w-full">
        Enviar
      </button>
    </div>
  </div>

  <!-- Columna de la Imagen -->
  <div appAnimateOnScroll enterClass="animate-fade-in-right" [once]="true"
    class="grid bg-bg-dark border border-border rounded-2xl min-h-[250px] place-content-center lg:min-h-0">
    imagen
  </div>

</div>
