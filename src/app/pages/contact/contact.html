<section class="grid-cols-1 text-center border border-border mt-20 ">
  <h1 class="text-5xl font-extrabold">Contacto</h1>
  <h2 class="text-2xl font-semibold pl-5 pt-2.5">Conecta con nosotros</h2>
</section>

<section class="mt-30 grid grid-cols-1">
  <div class="grid grid-cols-2 gap-y-10 border border-border">
    <label class="row-start-1">Nombre
      <input type="text" placeholder="Escribe tu nombre y ambos apellidos"
        class="bg-bg-dark border border-border rounded-xl px-5 py-5 row-start-2" />
    </label>

    <label>Mail
      <input type="email" placeholder="example@gmail.com"
        class="bg-bg-dark border border-border rounded-xl px-5 py-5" />
    </label>

    <label>Asunto
      <input type="text" placeholder="Describe brevemente tu petición"
        class="bg-bg-dark border border-border rounded-xl px-5 py-5" />
    </label>

    <button class="send-btn">Enviar</button>
  </div>

  <div class="image-col" aria-hidden="true"></div>
</section>
