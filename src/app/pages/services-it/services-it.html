<main class="grid grid-cols-1 gap-y-6 mt-10 px-4 md:gap-y-10 md:mt-20">
    <!-- Plan 1 -->
    <app-info-card appAnimateOnScroll enterClass="animate-fade-in-right" [once]="true"
        class="grid bg-bg-dark border border-border rounded-2xl mx-auto p-6 md:p-10 min-h-[350px] w-full md:max-w-[70%] md:min-h-[420px]">
        <h1 class="font-extrabold text-3xl md:text-5xl leading-tight">Plan 1: instalación +1 mes de soporte</h1>
        <h2 class="font-semibold text-xl md:text-2xl pl-2 pt-4 md:pl-5">Nuestro plan incluye:</h2>

        <div class="pl-4 pt-2 space-y-2 md:pl-10">
            <p class="font-normal text-base md:text-xl">instalación de la infraestructura IT</p>
            <p class="font-normal text-base md:text-xl">1 mes de soporte</p>
        </div>

        <button
            class="justify-self-start bg-text font-semibold rounded text-base text-bg md:text-lg hover:bg-text-muted mt-8 py-3 sm:px-20 md:mt-12 btn h-auto min-h-0 w-full sm:w-auto">
            Suscribirse
        </button>
    </app-info-card>

    <!-- Plan 2 -->
    <app-info-card appAnimateOnScroll enterClass="animate-fade-in-left" [once]="true"
        class="grid bg-bg-light border border-border rounded-2xl mx-auto p-6 md:p-10 min-h-[350px] w-full md:max-w-[70%] md:min-h-[420px]">
        <h1 class="font-extrabold text-3xl md:text-5xl leading-tight">Plan 2: instalación +1 año de soporte</h1>
        <h2 class="font-semibold text-xl md:text-2xl pl-2 pt-4 md:pl-5">Nuestro plan 2 incluye:</h2>

        <div class="pl-4 pt-2 space-y-2 md:pl-10">
            <p class="font-normal text-base md:text-xl">instalación de la infraestructura IT</p>
            <p class="font-normal text-base md:text-xl">1 año de soporte</p>
        </div>

        <button
            class="justify-self-start bg-text font-semibold rounded text-base text-bg md:text-lg hover:bg-text-muted mt-8 py-3 sm:px-20 md:mt-12 btn h-auto min-h-0 w-full sm:w-auto">
            Suscribirse
        </button>
    </app-info-card>
</main>
