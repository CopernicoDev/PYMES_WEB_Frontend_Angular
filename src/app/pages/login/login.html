<div class="grid grid-cols-1 text-center mt-20">
  <h1 class="text-5xl font-extrabold">Login</h1>
  <h2 class="text-2xl font-semibold pl-5 pt-2.5">Conéctate para acceder a nuestros servicios personalizados</h2>

</div>


<div class="grid grid-cols-1 min-w-[40vw] max-w-[50vw] min-h-[50vh] max-h-[70vh] mt-10 mx-auto p-10 place-items-center">
  <div class="min-w-[600px] h-full grid content-start gap-y-10 ">
    <app-input label="Correo" id="email" placeholder="Ingrese su correo"
      [control]="loginForm.controls.email"></app-input>
    <app-input label="Contraseña" id="password" placeholder="Ingrese su contraseña"
      [control]="loginForm.controls.password" type="password"></app-input>

    <!-- Contenedor general: Grid de 2 columnas -->
    <div class="grid grid-cols-2 items-center w-full">

      <!-- Lado Izquierdo: El checkbox y el texto (usando tu grid de antes) -->
      <label class="grid grid-cols-[auto_1fr] items-center gap-x-3 cursor-pointer w-max">
        <input type="checkbox" name="remember" id="remember"
          class="appearance-none border border-border checked:bg-border-muted w-5 h-5  cursor-pointer">
        <span>Recuérdame</span>
      </label>
      <!-- Lado Derecho: Fuera del label. 'justify-self-end' lo pega al extremo derecho -->
      <a class="justify-self-end hover:text-text-muted" href="">¿Has olvidado tu contraseña?</a>
    </div>
    <button class="bg-text hover:bg-text-muted text-bg font-semibold w-full rounded py-3">Login</button>
  </div>
</div>
