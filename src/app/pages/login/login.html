<div class="grid grid-cols-1 text-center mt-10 md:mt-20 px-4">
  <h1 class="text-3xl md:text-5xl font-extrabold">Login</h1>
  <h2 class="text-lg md:text-2xl font-semibold pt-2.5">Conéctate para acceder a nuestros servicios personalizados</h2>
</div>

<div class="grid grid-cols-1 w-full max-w-xl mt-6 md:mt-10 mx-auto px-4 md:px-10 place-items-center">
  <div class="w-full h-full grid content-start gap-y-6 md:gap-y-10">
    <app-input label="Correo" id="email" placeholder="Ingrese su correo" [control]="loginForm.controls.email"
      icon="email"></app-input>

    <app-input label="Contraseña" id="password" placeholder="Ingrese su contraseña"
      [control]="loginForm.controls.password" type="password" icon="password"></app-input>


    <!-- Contenedor general: Grid de 2 columnas alineado horizontalmente siempre -->
    <div class="grid grid-cols-2 items-center w-full text-xs sm:text-sm md:text-base gap-2">
      <!-- Lado Izquierdo: El checkbox -->
      <label class="grid grid-cols-[auto_1fr] items-center gap-x-2 cursor-pointer w-max">
        <input type="checkbox" checked="checked" class="checkbox checkbox-sm md:checkbox-md" />
        <span class="whitespace-nowrap">Recuérdame</span>
      </label>

      <!-- Lado Derecho: Enlace alineado a la derecha siempre dentro de su celda -->
      <a class="justify-self-end text-right hover:text-text-muted" href="">
        ¿Has olvidado tu contraseña?
      </a>
    </div>

    <button
      class="btn bg-text hover:bg-text-muted text-bg font-semibold text-lg w-full rounded py-3 transition-colors duration-200 h-auto min-h-0">
      Login
    </button>
  </div>
</div>
