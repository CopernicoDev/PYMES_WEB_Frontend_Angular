<div class="grid grid-cols-1 text-center mt-10 px-4 md:mt-20">
    <h1 class="font-extrabold text-3xl md:text-5xl">Registro</h1>
    <h2 class="font-semibold text-lg md:text-2xl pt-2.5">Regístrate para acceder a nuestros servicios personalizados
    </h2>
</div>

<div appAnimateOnScroll enterClass="animate-zoom-in" [once]="true"
    class="grid grid-cols-1 place-items-center mt-6 mx-auto px-4 md:mt-10 md:px-10 max-w-xl w-full">
    <div class="content-start grid gap-y-6 md:gap-y-10 h-full w-full">
        <app-input label="Correo" id="email" placeholder="Ingrese su correo" [control]="singUpForm.controls.email"
            icon="email"></app-input>

        <app-input label="Contraseña" id="password" placeholder="Ingrese su contraseña"
            [control]="singUpForm.controls.password" type="password" icon="password"></app-input>

        <app-input label="Confirmar Contraseña" id="confirmPassword" placeholder="Confirme su contraseña"
            [control]="singUpForm.controls.confirmPassword" type="password" icon="password"></app-input>


        <!-- Contenedor general: Checkbox adaptable -->
        <div class="grid grid-cols-1 items-center w-full">
            <label class="grid grid-cols-[auto_1fr] items-center gap-x-3 cursor-pointer w-max">
                <input type="checkbox" checked="checked" class="checkbox" />
                <span class="text-sm md:text-base">Recuérdame</span>
            </label>
        </div>

        <button
            class="bg-text font-semibold rounded text-bg text-lg hover:bg-text-muted mb-5 py-3 btn duration-200 h-auto min-h-0 transition-colors w-full">
            Registrarse
        </button>
    </div>
</div>
